runConfig:
  minInstances: 0
  maxInstances: 2
  concurrency: 80
  cpu: 1
  memoryMiB: 512

env:
  - variable: NODE_ENV
    value: production
    availability:
      - RUNTIME
  - variable: DEFAULT_ADMIN_EMAIL
    value: admin@sarindustriesnetwork.com
    availability:
      - BUILD
      - RUNTIME
  - variable: NEXT_PUBLIC_FIREBASE_ENABLED
    value: "true"
    availability:
      - BUILD
      - RUNTIME
