name: SAR Firebase CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: sar-firebase-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20.20.0
  PYTHON_VERSION: '3.11'

jobs:
  validate:
    name: Firebase Audit Typecheck Build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Firebase platform audit
        run: python scripts/sar_firebase_manager.py audit
      - name: Install dependencies
        run: npm install --registry=https://registry.npmjs.org/
      - name: Build check
        run: npm run check
        env:
          DEFAULT_ADMIN_EMAIL: admin@sarindustriesnetwork.com
          DEFAULT_ADMIN_PASSWORD: build-check-placeholder
          FIREBASE_PROJECT_ID: ci-build-placeholder
          NEXT_PUBLIC_FIREBASE_ENABLED: "true"
      - name: Upload build metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sar-firebase-build-metadata
          path: |
            package.json
            apphosting.yaml
            firebase.json
            firestore.rules
            firestore.indexes.json
            docs/AUDIT_REPORT.md
            docs/DEPLOYMENT_CHECKLIST.md
            docs/FIREBASE_MIGRATION.md
            docs/STEP_2_5_FIREBASE_BACKEND.md
          if-no-files-found: warn
