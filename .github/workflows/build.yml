name: SAR Platform Build Check

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Typecheck and Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.0
          cache: npm
      - name: Install dependencies
        run: npm install --registry=https://registry.npmjs.org/
      - name: Verify project
        run: npm run check
        env:
          DEFAULT_ADMIN_EMAIL: admin@sarindustriesnetwork.com
          DEFAULT_ADMIN_PASSWORD: build-check-placeholder
