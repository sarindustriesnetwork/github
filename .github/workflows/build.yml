name: SAR Localhost CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: sar-localhost-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20.20.0

jobs:
  validate:
    name: Localhost Audit Typecheck Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install dependencies
        run: npm install --registry=https://registry.npmjs.org/
      - name: Build check
        run: npm run check
        env:
          DEFAULT_ADMIN_EMAIL: admin@sarindustriesnetwork.com
          DEFAULT_ADMIN_PASSWORD: ci-placeholder
      - name: Upload build metadata
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sar-localhost-build-metadata
          path: |
            package.json
            README.md
            docs/LOCAL_WINDOWS_11_SETUP.md
            ONE_CLICK_WINDOWS_11.bat
          if-no-files-found: warn
